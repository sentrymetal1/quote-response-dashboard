<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quote Response Dashboard</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <!-- Essential Zoho SDK -->
    <script src="https://js.zohostatic.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; font-size: 13px; background: #f3f5f8; color: #3a5272; }

        /* Header */
        .hdr { background: #5f94ce; color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
        .hdr-title { font-size: 14px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
        .hdr-badge { background: rgba(255,255,255,.18); border-radius: 4px; padding: 4px 12px; font-size: 11px; }

        /* KPI Row */
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 15px 20px 0; }
        .kpi { background: #fff; border: 1px solid #e0e6ee; border-radius: 8px; padding: 15px; text-align: left; }
        .kpi-label { font-size: 10px; font-weight: 700; color: #7a90a8; text-transform: uppercase; margin-bottom: 8px; }
        .kpi-val { font-size: 24px; font-weight: 700; line-height: 1; }
        .blue { color: #5f94ce; } .green { color: #2e7d32; } .red { color: #c0392b; } .amber { color: #e65100; }

        /* Table Styles */
        .section { margin: 15px 20px; background: #fff; border: 1px solid #e0e6ee; border-radius: 10px; overflow: hidden; }
        .sec-hdr { background: #f8fafc; border-bottom: 1px solid #e0e6ee; padding: 10px 15px; font-size: 11px; font-weight: 700; color: #5f94ce; text-transform: uppercase; }
        .quote-table { width: 100%; border-collapse: collapse; }
        .quote-table th { background: #f8fafc; font-size: 10px; color: #7a90a8; text-transform: uppercase; padding: 12px 15px; text-align: left; border-bottom: 1px solid #e0e6ee; }
        .quote-table td { padding: 12px 15px; border-bottom: 1px solid #f0f3f7; font-size: 13px; }
        
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
        .badge-open { background: #e0f2fe; color: #0369a1; }
        
        .loading, .no-data { padding: 40px; text-align: center; color: #7a90a8; font-style: italic; }
    </style>
</head>
<body>

<div class="hdr">
    <span class="hdr-title">Material Compass — Quote Dashboard</span>
    <div class="hdr-badge" id="badgeQuotes">Initializing...</div>
</div>

<div class="kpi-row">
    <div class="kpi">
        <div class="kpi-label">Total Quotes</div>
        <div class="kpi-val blue" id="kpiTotal">0</div>
    </div>
    <div class="kpi">
        <div class="kpi-label">Completed</div>
        <div class="kpi-val green" id="kpiComplete">0</div>
    </div>
    <div class="kpi">
        <div class="kpi-label">Pending</div>
        <div class="kpi-val amber" id="kpiPending">0</div>
    </div>
    <div class="kpi">
        <div class="kpi-label">At Risk</div>
        <div class="kpi-val red" id="kpiRisk">0</div>
    </div>
</div>

<div class="section">
    <div class="sec-hdr">Supplier Response Summary</div>
    <div id="tableContainer">
        <div class="loading">Connecting to Zoho Creator...</div>
    </div>
</div>

<script>
    // 1. Handshake with Zoho Creator
    ZOHO.CREATOR.init().then(function(data) {
        console.log("SDK Initialized");
        fetchDashboardData();
    });

    // 2. Fetch Data from your specific Report
    async function fetchDashboardData() {
        const config = {
            appName: "type-formsheet-2-18-21",
            reportName: "All_Supplier_Manufacture_Material_Quotes"
        };

        try {
            const response = await ZOHO.CREATOR.API.getAllRecords(config);
            const records = response.data || [];
            
            updateDashboard(records);
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('tableContainer').innerHTML = `<div class="no-data">Error: Ensure the Report Link Name is correct.</div>`;
        }
    }

    // 3. Populate KPIs and Table
    function updateDashboard(records) {
        // Update KPIs
        document.getElementById('kpiTotal').innerText = records.length;
        document.getElementById('badgeQuotes').innerText = `${records.length} Records Found`;

        // Build Table
        if (records.length === 0) {
            document.getElementById('tableContainer').innerHTML = `<div class="no-data">No records found.</div>`;
            return;
        }

        let tableHtml = `
            <table class="quote-table">
                <thead>
                    <tr>
                        <th>Supplier</th>
                        <th>Manufacturer</th>
                        <th>Sent Date</th>
                        <th>Due Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>`;

        records.forEach(rec => {
            tableHtml += `
                <tr>
                    <td><strong>${rec.Supplier || '-'}</strong></td>
                    <td>${rec.Manufacturer || '-'}</td>
                    <td>${rec.SENT || '-'}</td>
                    <td>${rec.DUE || '-'}</td>
                    <td><span class="badge badge-open">${rec.Status || 'Active'}</span></td>
                </tr>`;
        });

        tableHtml += `</tbody></table>`;
        document.getElementById('tableContainer').innerHTML = tableHtml;
    }
</script>

</body>
</html>
